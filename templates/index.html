<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoonForward</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        color: #f0f0f0;
        overflow: hidden;
      }

      .container {
        text-align: center;
        padding: 3rem 2rem;
        max-width: 600px;
        animation: fadeUp 0.8s ease-out both;
      }

      .logo {
        font-size: 3.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
      }

      .tagline {
        font-size: 1.25rem;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.6;
      }

      .cta {
        display: inline-block;
        padding: 0.875rem 2.5rem;
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border: none;
        border-radius: 50px;
        text-decoration: none;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
      }

      .cta:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
      }

      .cta:active {
        transform: translateY(0);
      }

      .email-form {
        margin-top: 2.5rem;
      }

      .email-label {
        display: block;
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 0.75rem;
      }

      .input-group {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .email-input {
        padding: 0.875rem 1.25rem;
        font-size: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 50px;
        background: rgba(255, 255, 255, 0.06);
        color: #f0f0f0;
        width: 280px;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .email-input::placeholder {
        color: rgba(255, 255, 255, 0.35);
      }

      .email-input:focus {
        border-color: rgba(102, 126, 234, 0.6);
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
      }

      .decoration {
        position: fixed;
        border-radius: 50%;
        background: rgba(102, 126, 234, 0.08);
        pointer-events: none;
      }

      .decoration--1 {
        width: 400px;
        height: 400px;
        top: -100px;
        right: -100px;
      }

      .decoration--2 {
        width: 300px;
        height: 300px;
        bottom: -80px;
        left: -80px;
        background: rgba(118, 75, 162, 0.08);
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 480px) {
        .logo {
          font-size: 2.5rem;
        }

        .tagline {
          font-size: 1.05rem;
        }

        .container {
          padding: 2rem 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="decoration decoration--1"></div>
    <div class="decoration decoration--2"></div>

    <div class="container">
      <h1 class="logo">SoonForward</h1>
      <p class="tagline">
        Something great is on the way. We're building the future, one step at a
        time.
      </p>
      <form class="email-form" action="#" method="post">
        <label for="email" class="email-label">please input your email address</label>
        <div class="input-group">
          <input
            type="email"
            id="email"
            name="email"
            class="email-input"
            placeholder="you@example.com"
            required
          />
          <button type="submit" class="cta">Submit</button>
        </div>
      </form>
    </div>
  </body>
</html>
